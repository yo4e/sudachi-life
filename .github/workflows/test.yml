name: Test

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply and publish bounded patch
        shell: bash
        run: |
          set -o pipefail
          python - <<'PY' 2>&1 | tee patch.log
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              print(f"{path}: target count={count}")
              if count != 1:
                  raise SystemExit(f"{path}: expected one replacement target, found {count}")
              file.write_text(text.replace(old, new, 1))

          replace_once(
              "src/sudachi_life/budgets.py",
              "        exhaustion: ProtectedBudgetExhaustion,\n    ) -> None:\n        \"\"\"Finalize one safely classified exhaustion inside cleanup capacity.\"\"\"\n",
              "        exhaustion: ProtectedBudgetExhaustion,\n        terminalization_elapsed_monotonic_ns: int,\n    ) -> None:\n        \"\"\"Finalize one classified exhaustion before cleanup grace expires.\"\"\"\n",
          )
          replace_once(
              "src/sudachi_life/budgets.py",
              '''        self.semantic_steps_used = semantic_steps_used
          self.elapsed_monotonic_ns = exhaustion.observed_elapsed_monotonic_ns
          self.exhaustion = exhaustion
          ''',
              '''        if terminalization_elapsed_monotonic_ns < 0:
              raise SchemaValidationError(
                  "terminalization elapsed time may not be negative"
              )
          if (
              terminalization_elapsed_monotonic_ns
              < exhaustion.observed_elapsed_monotonic_ns
          ):
              raise SchemaValidationError(
                  "terminalization elapsed time precedes exhaustion detection"
              )
          cleanup_limit_ns = (
              int(self.limits["lifecycle_wall_time_ms"])
              + int(self.limits["cleanup_grace_ms"])
          ) * 1_000_000
          if terminalization_elapsed_monotonic_ns > cleanup_limit_ns:
              raise BudgetExhaustedError(
                  "protected cleanup grace exhausted before lifecycle terminalization"
              )
          self.semantic_steps_used = semantic_steps_used
          self.elapsed_monotonic_ns = terminalization_elapsed_monotonic_ns
          self.exhaustion = exhaustion
          ''',
          )
          replace_once(
              "src/sudachi_life/lifecycle.py",
              '''        if budget_exhaustion is not None:
              finished = pre_action
              ledger.finish_exhausted(
                  semantic_steps_used=12,
                  exhaustion=budget_exhaustion,
              )
          ''',
              '''        if budget_exhaustion is not None:
              finished = clock.read()
              ledger.finish_exhausted(
                  semantic_steps_used=12,
                  exhaustion=budget_exhaustion,
                  terminalization_elapsed_monotonic_ns=(
                      finished.monotonic_ns - started.monotonic_ns
                  ),
              )
          ''',
          )
          replace_once(
              "tests/test_budget_exhaustion.py",
              "            ClockReading(303, 2_030_000_000),\n",
              "            ClockReading(303, 2_030_000_000),\n            ClockReading(304, 2_040_000_000),\n",
          )
          replace_once(
              "tests/test_budget_exhaustion.py",
              "    assert clock.read_count == 4\n",
              "    assert clock.read_count == 5\n",
          )
          replace_once(
              "tests/test_budget_exhaustion.py",
              "    assert result.budget_ledger[\"elapsed_monotonic_ns\"] == 2_001_000_000\n",
              "    assert result.budget_ledger[\"elapsed_monotonic_ns\"] == 2_010_000_000\n",
          )
          PY

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/sudachi_life/budgets.py src/sudachi_life/lifecycle.py tests/test_budget_exhaustion.py
          git diff --cached --check
          git commit -m "fix: enforce cleanup grace at terminalization"
          git push origin HEAD:${{ github.head_ref }}

      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slice27-patch-log
          path: patch.log
          if-no-files-found: ignore
          retention-days: 1
