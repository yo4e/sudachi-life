name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install --quiet -e ".[dev]"

      - name: Compile source and tests
        run: python -m compileall -q src tests

      - name: Run protected tests
        id: pytest
        shell: bash
        run: |
          set +e
          pytest -q --tb=short > pytest.log 2>&1
          status=$?
          cat pytest.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload protected test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: pytest.log
          if-no-files-found: error
          retention-days: 7

      - name: Enforce protected test result
        if: steps.pytest.outputs.status != '0'
        run: exit 1

      - name: Smoke-test genesis CLI
        shell: bash
        run: |
          runtime_dir="$(mktemp -d)"
          sudachi --runtime-dir "$runtime_dir" init sudachi-0 --json > init.json
          sudachi --runtime-dir "$runtime_dir" status sudachi-0 --json > status.json
          python - <<'PY'
          import json

          with open("init.json", encoding="utf-8") as handle:
              initialized = json.load(handle)
          with open("status.json", encoding="utf-8") as handle:
              status = json.load(handle)

          assert initialized["organism_id"] == "sudachi-0"
          assert initialized["status"] == "sleeping"
          assert initialized["checkpoint_pending"] is False
          assert initialized["genesis_checkpoint_id"] == status["latest_stable_checkpoint_id"]
          assert status["organism_id"] == "sudachi-0"
          assert status["event_count"] == 3
          assert status["water_units"] == 1
          assert status["harvested_fruit"] == 0
          assert [plot["plot_id"] for plot in status["plots"]] == ["bed-a", "bed-b"]
          PY
