name: Apply Slice 10 continuity

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply exact continuity patch
        run: |
          base64 -d .github/slice10-continuity.patch.gz.b64 | gzip -d > /tmp/slice10-continuity.patch
          echo "cfedc63ac5e7afbd5810f4aba1807e276b9d440887d25a121ba75c5a3a30b7ae  /tmp/slice10-continuity.patch" | sha256sum -c -
          git apply --index /tmp/slice10-continuity.patch
          rm .github/slice10-continuity.patch.gz.b64
          rm .github/workflows/apply-slice10-continuity.yml
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: record Slice 10 continuity"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
