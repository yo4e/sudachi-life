name: Development snapshot

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Archive exact pull-request worktree
        run: >-
          tar
          --exclude=.git
          --exclude=.github/workflows/development-snapshot.yml
          -czf /tmp/sudachi-pr-tree.tar.gz
          .
      - name: Upload worktree
        uses: actions/upload-artifact@v4
        with:
          name: sudachi-pr-tree
          path: /tmp/sudachi-pr-tree.tar.gz
          retention-days: 1
