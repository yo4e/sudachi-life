name: Apply Slice 7 documentation v2

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply recounted continuity patch once
        shell: bash
        run: |
          set -euo pipefail
          patch=.github/patches/slice7-docs.patch
          if [[ ! -f "$patch" ]]; then
            echo "Documentation patch already applied."
            exit 0
          fi
          git apply --recount --check "$patch"
          git apply --recount "$patch"
          rm -rf .github/patches
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add AGENTS.md docs .github/patches
          git commit -m "docs: advance continuity after recovery slice"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
