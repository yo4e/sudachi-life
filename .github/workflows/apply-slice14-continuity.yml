name: Apply Slice 14 continuity

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply exact Slice 14 continuity patch
        run: |
          base64 -d .github/patches/slice14-continuity.patch.gz.b64 | gzip -d > /tmp/slice14-continuity.patch
          git apply --check /tmp/slice14-continuity.patch
          git apply /tmp/slice14-continuity.patch
          rm .github/patches/slice14-continuity.patch.gz.b64
          rm .github/workflows/apply-slice14-continuity.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: advance continuity after Slice 14"
          git push
