name: Apply Slice 13 continuity v2

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply exact continuity replacements
        run: |
          python - <<'PY'
          from pathlib import Path

          agents = Path('AGENTS.md')
          text = agents.read_text()
          start = text.index('Slices 1–12 establish:')
          end = text.index('Phase 1 remains deterministic, local, network-free, and caregiver-free.')
          block = '''Slices 1–13 establish:

          - a canonical SQLite organism body
          - injected time and protected concrete budgets
          - stable genesis, water, harvest, justified-abstention, blocked-abstention, recovery, action-failure, and budget-exhaustion checkpoints
          - idempotent synthetic garden ticks
          - fail-fast wake ownership and deterministic observation
          - fixed-policy `water_plot(bed-a)` and `harvest_plot(bed-b)` wakes
          - justified `objective_already_complete` abstention with zero action and mutation cost
          - classified `no_applicable_action` abstention when the objective is incomplete but no protected mutation is executable
          - independent transition, abstention, rolled-back failure, and budget-exhaustion evaluation
          - explicit failure-streak accounting below the maintenance threshold
          - resource-aware harvest fallback when watering is impossible
          - verified failure-streak reset after positive progress
          - classified injected action failure after a partial savepoint write
          - removal of partial environment change while preserving charged action-attempt cost
          - an explicit pre-action monotonic deadline check for every wake
          - classified lifecycle wall-time exhaustion before action attempt or environment mutation
          - exact maintenance-threshold entry after the third consecutive classified failure
          - typed `consecutive_failure_limit_reached` maintenance state after checkpoint stabilization
          - later normal-wake rejection without clock reads, event writes, input consumption, or state advancement
          - explicit administrative `maintenance inspect` API and CLI boundaries
          - canonical maintenance reason, failure streak, latest checkpoint, and queued-input reporting
          - read-only inspection with no clocks, claims, events, canonical writes, file changes, or maintenance clearing
          - typed rejection when inspection is requested outside `maintenance_required`
          - explicit administrative `maintenance clear` API and CLI boundaries
          - bounded recovery-reason validation before clock use or canonical mutation
          - fail-fast maintenance-clear ownership and exact protected-state validation
          - atomic `maintenance_required -> sleeping` recovery with failure streak `3 -> 0`
          - typed `maintenance_cleared` audit history with rollback if the audit write fails
          - preservation of environment, checkpoint references, and queued input through maintenance clear
          - later normal-wake processing of the preserved tick under the unchanged fixed policy
          - bounded stable-checkpoint retention under protected limit four
          - fifth-checkpoint stabilization before any pruning
          - genesis preservation and oldest-eligible non-genesis pruning
          - matching artifact and registry removal with typed `checkpoint_pruned` audit history
          - exact retained-checkpoint and byte accounting with normal wakeability preserved
          - the complete canonical four-wake run plus protected blocked-state, recovery, action-failure, budget-exhaustion, maintenance-threshold, maintenance-inspection, maintenance-clear, and checkpoint-retention fixtures

          After PR #27 is merged, the exact next implementation slice is **Slice 14: classified checkpoint-retention pruning failure**.

          It must inject one protected deterministic pruning failure only after the newer checkpoint is stable, preserve the newly stable latest checkpoint, restore or expose the staged older artifact without false successful pruning, keep registry and filesystem state auditable, enter an explicit typed maintenance warning, block later normal wakes, and pass protected tests and CI.

          Do not add checkpoint repair, orphan cleanup, maintenance clear for this new reason, lineage rollback, a caregiver, chat, learning, memories, skills, or a general agent loop in Slice 14.

          '''
          block = '\n'.join(line[10:] if line.startswith('          ') else line for line in block.splitlines()) + '\n'
          agents.write_text(text[:start] + block + text[end:])

          handoff = Path('docs/HANDOFF.md')
          text = handoff.read_text()
          marker = 'Environment repair, checkpoint repair, retention pruning, and rollback are not implemented.\n\n'
          if marker not in text:
              raise SystemExit('Slice 13 insertion marker missing')
          section = '''### Slice 13 — successful bounded checkpoint retention pruning

          Implemented and verified in PR #27:

          - the canonical three-wake history starts with four stable checkpoints at boundaries 2, 13, 24, and 34
          - a fourth objective-complete abstention wake commits boundary 44 and registers it as the newest stable checkpoint
          - pruning begins only after checkpoint stabilization is recorded at event 45
          - the protected retention transaction validates exact latest-stable identity and requires exactly five registered stable checkpoints
          - genesis is preserved and the oldest eligible non-genesis checkpoint at boundary 13 is selected
          - the selected artifact is staged by same-filesystem atomic rename before canonical registry mutation
          - one matching registry row is deleted and typed `checkpoint_pruned` event 46 records identifier, boundary, lineage, provenance, database bytes, total artifact bytes, retained count, and retained store bytes
          - the staged artifact is removed only after the canonical pruning transaction commits
          - the final retained boundaries are 2, 24, 34, and 44
          - every retained checkpoint validates, no staging directory remains, and normal wake ownership can still be acquired
          - active environment, objective, inventory, lineage, failure streak, latest-stable references, and inbox history remain unchanged

          Pruning-failure maintenance warning, checkpoint repair, orphan cleanup, and rollback are not implemented.

          '''
          section = '\n'.join(line[10:] if line.startswith('          ') else line for line in section.splitlines()) + '\n'
          text = text.replace(marker, marker + section, 1)
          text = text.replace('GitHub Actions passed on PR #26 with Python 3.12:', 'GitHub Actions passed on PR #27 with Python 3.12:', 1)
          text = text.replace('- **41 protected tests**', '- **42 protected tests**', 1)
          old = '- the maintenance-clear fixture proves bounded reason validation, fail-fast ownership, atomic state and audit commit, exact preservation, rollback on audit failure, and later processing of the preserved tick\n\nThe exact local source-tree run also passed **41 tests** and compileall.'
          new = '- the maintenance-clear fixture proves bounded reason validation, fail-fast ownership, atomic state and audit commit, exact preservation, rollback on audit failure, and later processing of the preserved tick\n- the checkpoint-retention fixture proves no pruning at four, fifth-checkpoint stability before pruning, genesis and latest preservation, oldest-eligible selection, exact artifact and registry removal, explicit byte-accounted audit history, and continued normal wakeability\n\nThe exact local source-tree run also passed **42 tests** and compileall.'
          if old not in text:
              raise SystemExit('verification marker missing')
          text = text.replace(old, new, 1)
          fixture_marker = 'After the preserved tick runs normally, the same fixture finishes with lifecycle one, failure streak one, stable boundary 18, event count 19, status `sleeping`, and the tick consumed. The environment remains blocked and unchanged.\n\n'
          fixture = '''The isolated Slice 13 checkpoint-retention fixture finishes with:

          - `lifecycle_number = 4`
          - `environment_step = 2`
          - `bed-a.moisture = 1`
          - `bed-b.fruit = 0`
          - `water_units = 0`
          - `harvested_fruit = 1`
          - `objective_complete = true`
          - `consecutive_failures = 0`
          - `latest_stable_event_sequence = 44`
          - `event_count = 46`
          - `status = sleeping`
          - retained checkpoint boundaries 2, 24, 34, and 44
          - genesis retained and lifecycle boundary 13 pruned
          - event 46 typed administrative `checkpoint_pruned`
          - no retention staging directory remains
          - normal wake ownership remains available

          '''
          fixture = '\n'.join(line[10:] if line.startswith('          ') else line for line in fixture.splitlines()) + '\n'
          if fixture_marker not in text:
              raise SystemExit('fixture marker missing')
          text = text.replace(fixture_marker, fixture_marker + fixture, 1)
          start = text.index('## Exact next implementation task')
          end = text.index('## Current issue map')
          next_task = '''## Exact next implementation task

          After PR #27 is merged, create a new branch from current `main` and implement **Slice 14: classified checkpoint-retention pruning failure**.

          The slice must:

          1. start from the protected fifth-checkpoint condition only after boundary 44 is stable and registered
          2. inject one deterministic test-only pruning failure at a declared point in the retention phase
          3. preserve the newly stable latest checkpoint and exact latest-stable references
          4. avoid a false `checkpoint_pruned` success record
          5. restore the staged older artifact when the failure occurs before canonical pruning commit, or otherwise expose the incomplete cleanup explicitly
          6. preserve auditable registry, filesystem, and byte-accounting state
          7. record one typed maintenance warning for the failed retention operation and leave the organism non-wakeable
          8. pass protected tests and CI

          Do not add checkpoint repair, orphan cleanup, maintenance clear for the new reason, lineage rollback, caregiver consultation, learning, or generic planning in Slice 14.

          '''
          next_task = '\n'.join(line[10:] if line.startswith('          ') else line for line in next_task.splitlines()) + '\n'
          handoff.write_text(text[:start] + next_task + text[end:])

          matrix = Path('docs/PHASE1_TEST_MATRIX.md')
          text = matrix.read_text()
          replacements = {
              'Status: **Slices 1–12 implemented — Phase 1 incomplete**': 'Status: **Slices 1–13 implemented — Phase 1 incomplete**',
              '| 23. Sequence order is canonical | Genesis, all three canonical lifecycle sequences, blocked-state, recovery, classified action-failure, classified budget-exhaustion, maintenance-threshold, and administrative maintenance-clear sequences are asserted |': '| 23. Sequence order is canonical | Genesis, all four canonical lifecycle sequences, blocked-state, recovery, classified action-failure, classified budget-exhaustion, maintenance-threshold, administrative maintenance-clear, and checkpoint-pruning sequences are asserted |',
              '| 35. Retention is bounded and safe | Limits are stored and publication size is enforced; pruning behavior remains planned |': '| 35. Retention is bounded and safe | `tests/test_checkpoint_retention.py::test_fifth_stable_checkpoint_prunes_oldest_eligible_after_registration` proves no pruning at four, stabilization of the fifth before pruning, genesis and latest preservation, oldest-eligible removal, exact four-row/four-artifact retention, byte-accounted audit history, retained-checkpoint validation, and continued normal wakeability; pruning-failure maintenance remains planned |',
              '| 41. Administration is distinguishable | Input and checkpoint events use administrative sources; lifecycle events use the organism fixed-policy source; maintenance inspection is a separate read-only administrative command; maintenance clear records typed `maintenance_cleared` from source `administration:maintenance-clear` |': '| 41. Administration is distinguishable | Input and checkpoint events use administrative sources; lifecycle events use the organism fixed-policy source; maintenance inspection is a separate read-only administrative command; maintenance clear records typed `maintenance_cleared` from source `administration:maintenance-clear`; retention records typed `checkpoint_pruned` from source `administration:checkpoint-retention` |',
              'PR #26 passed GitHub Actions on Python 3.12 with **41 protected tests**.': 'PR #27 passed GitHub Actions on Python 3.12 with **42 protected tests**.',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'matrix marker missing: {old}')
              text = text.replace(old, new, 1)
          matrix.write_text(text)
          PY
          rm .github/workflows/apply-slice13-continuity-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: advance continuity after Slice 13"
          git push
