name: Apply Slice 15 runtime

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply exact Slice 15 runtime patch
        run: |
          base64 -d .github/patches/slice15-runtime.patch.gz.b64 | gzip -d > /tmp/slice15-runtime.patch
          git apply --check /tmp/slice15-runtime.patch
          git apply /tmp/slice15-runtime.patch
          rm .github/patches/slice15-runtime.patch.gz.b64
          rm .github/workflows/apply-slice15-runtime.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: repair one pending checkpoint registration"
          git push
