name: Apply Slice 6 documentation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply staged documentation patch once
        shell: bash
        run: |
          set -euo pipefail
          first=.github/patches/slice6-docs.part-00
          if [[ ! -f "$first" ]]; then
            echo "Documentation patch already applied."
            exit 0
          fi
          cat .github/patches/slice6-docs.part-* > /tmp/slice6-docs.patch
          git apply --check /tmp/slice6-docs.patch
          git apply /tmp/slice6-docs.patch
          rm -rf .github/patches
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add AGENTS.md docs .github/patches
          git commit -m "docs: record classified abstention slice"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
