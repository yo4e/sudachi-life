name: Apply Slice 7 documentation v3

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Run exact replacement script once
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d .github/patches ]]; then
            echo "Documentation replacements already applied."
            exit 0
          fi
          python - <<'PY'
          from pathlib import Path

          workflow = Path(".github/workflows/apply-slice7-docs.yml").read_text()
          start = "          python - <<'PY'\n"
          end = "          PY\n"
          if start not in workflow or end not in workflow:
              raise SystemExit("embedded exact-replacement script was not found")
          body = workflow.split(start, 1)[1].split(end, 1)[0]
          lines = []
          for line in body.splitlines():
              if line.startswith("          "):
                  line = line[10:]
              lines.append(line)
          Path("/tmp/apply_slice7_docs.py").write_text("\n".join(lines) + "\n")
          PY
          python /tmp/apply_slice7_docs.py
          rm -rf .github/patches
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add AGENTS.md docs .github/patches
          git commit -m "docs: advance continuity after recovery slice"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
