name: Apply Slice 12 runtime

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply exact runtime and protected-test patch
        run: |
          base64 -d .slice12-runtime.patch.gz.b64 | gunzip > /tmp/slice12-runtime.patch
          echo '615267ace6d1a09d4931af181fec72d41a8a97cf6ff2bd2a560abacd8557d113  /tmp/slice12-runtime.patch' | sha256sum -c -
          git apply --check /tmp/slice12-runtime.patch
          git apply /tmp/slice12-runtime.patch
          rm .slice12-runtime.patch.gz.b64
          rm .github/workflows/slice12-source-snapshot.yml
          rm .github/workflows/slice12-apply-runtime.yml
          git config user.name 'sudachi-life automation'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'feat: implement audited maintenance clear'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
