name: Apply Slice 7 documentation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply exact continuity replacements once
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d .github/patches ]]; then
            echo "Documentation replacements already applied."
            exit 0
          fi
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one replacement target, found {count}")
              target.write_text(text.replace(old, new, 1))

          replace_once(
              "AGENTS.md",
              """Slices 1–6 establish:

- a canonical SQLite organism body
- injected time and protected concrete budgets
- stable genesis, water, harvest, justified-abstention, and blocked-abstention checkpoints
- idempotent synthetic garden ticks
- fail-fast wake ownership and deterministic observation
- fixed-policy `water_plot(bed-a)` and `harvest_plot(bed-b)` wakes
- justified `objective_already_complete` abstention with zero action and mutation cost
- classified `no_applicable_action` abstention when the objective is incomplete but no protected mutation is executable
- independent transition and abstention evaluation
- explicit failure-streak accounting below the maintenance threshold
- the complete canonical three-wake run plus one protected blocked-state fixture

After PR #20 is merged, the exact next implementation slice is **Slice 7: resource-aware harvest fallback and failure-streak reset**.

It must use an explicit protected fixture with an incomplete objective, a dry living plot, no water, one harvestable fruit, and `consecutive_failures = 1`; prove that the fixed policy skips impossible watering, selects `harvest_plot`, makes positive progress, resets the failure streak to zero, checkpoints the outcome, and returns to sleep.

Do not add budget-exhaustion handling, injected action failure, maintenance-threshold entry, rollback, a caregiver, chat, learning, memories, skills, or a general agent loop in Slice 7.
""",
              """Slices 1–7 establish:

- a canonical SQLite organism body
- injected time and protected concrete budgets
- stable genesis, water, harvest, justified-abstention, blocked-abstention, and recovery checkpoints
- idempotent synthetic garden ticks
- fail-fast wake ownership and deterministic observation
- fixed-policy `water_plot(bed-a)` and `harvest_plot(bed-b)` wakes
- justified `objective_already_complete` abstention with zero action and mutation cost
- classified `no_applicable_action` abstention when the objective is incomplete but no protected mutation is executable
- independent transition and abstention evaluation
- explicit failure-streak accounting below the maintenance threshold
- resource-aware harvest fallback when watering is impossible
- verified failure-streak reset after positive progress
- the complete canonical three-wake run plus protected blocked-state and recovery fixtures

After PR #21 is merged, the exact next implementation slice is **Slice 8: classified action failure and savepoint cost preservation**.

It must inject one protected failure after a registered action begins inside its SQLite savepoint; prove partial environment changes disappear, the action attempt remains charged in the committed classified outcome, no false success is recorded, the failure streak increments exactly once below maintenance, a checkpoint stabilizes the result, and the organism returns to sleep.

Do not add budget-exhaustion handling, maintenance-threshold entry, lineage rollback, a caregiver, chat, learning, memories, skills, or a general agent loop in Slice 8.
""",
          )

          replace_once(
              "docs/HANDOFF.md",
              "### Slice 6 — classified no-applicable-action abstention\n\nImplemented and verified in PR #20:",
              "### Slice 6 — classified no-applicable-action abstention\n\nMerged through PR #20:",
          )
          replace_once(
              "docs/HANDOFF.md",
              """The fixture is test administration, not a live caregiver. No human, model, or fixture caregiver participates in action selection.

## Verified implementation results
""",
              """The fixture is test administration, not a live caregiver. No human, model, or fixture caregiver participates in action selection.

### Slice 7 — resource-aware harvest recovery

Implemented and verified in PR #21:

- a protected administrative fixture starts with an incomplete objective, a dry sprout, zero water, one harvestable fruit, and `consecutive_failures = 1`
- deterministic observation exposes no executable water target and one executable harvest target
- the fixed policy skips impossible watering and selects `harvest_plot(bed-b)`
- one input, observation, action attempt, and environment mutation are consumed; all external-capability counters remain zero
- the independent evaluator proves the exact harvest transition, positive progress, and an objective that correctly remains incomplete
- unresolved needs decrease from two to one
- `consecutive_failures` resets exactly once from one to zero
- the committed pending boundary is event sequence 17 and administrative stabilization is event sequence 18
- the organism returns to `sleeping`

The recovery fixture is also test administration and does not participate in action selection.

## Verified implementation results
""",
          )
          replace_once(
              "docs/HANDOFF.md",
              """GitHub Actions passed on PR #20 with Python 3.12:

- clean editable installation
- `python -m compileall -q src tests`
- **30 protected tests**
- installed genesis CLI smoke test
- all earlier canonical water, harvest, and completion-abstention behavior remains protected
- the blocked-state fixture completes typed abstention, one failure increment, checkpoint stabilization, and sleep
""",
              """GitHub Actions passed on PR #21 with Python 3.12:

- clean editable installation
- `python -m compileall -q src tests`
- **31 protected tests**
- installed genesis CLI smoke test
- all earlier canonical water, harvest, and completion-abstention behavior remains protected
- the blocked-state fixture completes typed abstention, one failure increment, checkpoint stabilization, and sleep
- the recovery fixture skips impossible watering, harvests, resets the failure streak, checkpoints, and sleeps
""",
          )
          replace_once(
              "docs/HANDOFF.md",
              """- `event_count = 17`
- `status = sleeping`

## Integration repair record
""",
              """- `event_count = 17`
- `status = sleeping`

The isolated Slice 7 recovery fixture finishes with:

- `lifecycle_number = 1`
- `environment_step = 1`
- `bed-a.moisture = 0`
- `bed-b.fruit = 0`
- `water_units = 0`
- `harvested_fruit = 1`
- `objective_complete = false`
- `consecutive_failures = 0`
- `latest_stable_event_sequence = 17`
- `event_count = 18`
- `status = sleeping`

## Integration repair record
""",
          )
          replace_once(
              "docs/HANDOFF.md",
              """After PR #20 is merged, create a new branch from current `main` and implement **Slice 7: resource-aware harvest fallback and failure-streak reset**.

The slice must:

1. use an explicit protected fixture with an incomplete objective, a dry living plot, zero water, one harvestable fruit, and `consecutive_failures = 1`
2. claim one tick and build one complete observation
3. prove that watering is impossible because the water resource is absent
4. select `harvest_plot` as the next executable protected action
5. consume one input, one observation, one action attempt, and one environment mutation
6. independently prove positive progress and the exact harvest transition
7. reset `consecutive_failures` from one to zero
8. commit and stabilize an exact checkpoint boundary
9. return to sleep and prove the result in protected tests and CI

Do not add budget exhaustion, injected action failure, maintenance-threshold entry, rollback, caregiver consultation, learning, or generic planning in Slice 7.
""",
              """After PR #21 is merged, create a new branch from current `main` and implement **Slice 8: classified action failure and savepoint cost preservation**.

The slice must:

1. use an explicit protected failure-injection fixture with one executable registered action
2. reserve and charge the action attempt before execution
3. begin the transition inside the existing SQLite savepoint
4. inject a classified failure after at least one partial environment write
5. prove the savepoint removes every partial environment change
6. commit a failure outcome without recording false action success
7. preserve the charged action-attempt cost while recording zero successful environment mutations
8. increment `consecutive_failures` exactly once below the maintenance threshold
9. commit and stabilize an exact checkpoint boundary
10. return to sleep and prove the result in protected tests and CI

Do not add budget exhaustion, maintenance-threshold entry, lineage rollback, caregiver consultation, learning, or generic planning in Slice 8.
""",
          )

          replacements = {
              "Status: **Slices 1–6 implemented — Phase 1 incomplete**": "Status: **Slices 1–7 implemented — Phase 1 incomplete**",
              "Partial: deterministic initialization, the canonical three-wake policy, and the protected blocked-state outcome are covered; full repeated-run equivalence remains planned": "Partial: deterministic initialization, the canonical three-wake policy, blocked-state outcome, and resource-aware recovery outcome are covered; full repeated-run equivalence remains planned",
              "| 14. Resource-aware harvest fallback | Planned |": "| 14. Resource-aware harvest fallback | `tests/test_resource_aware_recovery.py::test_resource_aware_harvest_recovers_and_resets_failure_streak` proves zero water removes all water targets while `bed-b` remains an executable harvest target |",
              "Completion abstention proves the justified zero state; Slice 6 proves one classified increment below threshold; successful reset from a prior failure and threshold entry remain planned": "Completion abstention proves the justified zero state; Slice 6 proves one classified increment; Slice 7 proves successful reset from one to zero; threshold entry remains planned",
              "Genesis, all three canonical lifecycle sequences, and the blocked-state failure sequence are asserted": "Genesis, all three canonical lifecycle sequences, the blocked-state failure sequence, and the recovery sequence are asserted",
              "Water validates 13, harvest 24, completion abstention 34, and the blocked fixture 16": "Water validates 13, harvest 24, completion abstention 34, blocked fixture 16, and recovery fixture 17",
              "Genesis plus water, harvest, completion-abstention, and blocked-abstention checkpoint validation": "Genesis plus water, harvest, completion-abstention, blocked-abstention, and recovery checkpoint validation",
              "SQLite-only action/abstention paths plus hard-zero ledgers cover the canonical run and blocked fixture": "SQLite-only action/abstention paths plus hard-zero ledgers cover the canonical run, blocked fixture, and recovery fixture",
              "PR #20 passed GitHub Actions on Python 3.12 with **30 protected tests**.": "PR #21 passed GitHub Actions on Python 3.12 with **31 protected tests**.",
          }
          matrix = Path("docs/PHASE1_TEST_MATRIX.md")
          text = matrix.read_text()
          for old, new in replacements.items():
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"matrix replacement expected once, found {count}: {old}")
              text = text.replace(old, new, 1)
          matrix.write_text(text)
          PY
          rm -rf .github/patches
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add AGENTS.md docs .github/patches
          git commit -m "docs: advance continuity after recovery slice"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
