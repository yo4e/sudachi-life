name: Development snapshot

on:
  pull_request:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Package exact pull-request tree
        run: zip -rq sudachi-pr-tree.zip . -x '.git/*' 'sudachi-pr-tree.zip'

      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: sudachi-pr-tree
          path: sudachi-pr-tree.zip
          if-no-files-found: error
          retention-days: 1
