name: Apply Slice 9 runtime

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply exact runtime and protected-test patch
        shell: bash
        run: |
          set -euo pipefail
          payload=.github/patches/slice9-runtime-tests.patch.gz.b64
          if [[ ! -f "$payload" ]]; then
            echo "Slice 9 runtime patch already applied."
            exit 0
          fi
          base64 --decode "$payload" | gzip --decompress > /tmp/slice9.patch
          git apply --check /tmp/slice9.patch
          git apply /tmp/slice9.patch
          rm -rf .github/patches
          rm -f .github/workflows/apply-slice9-runtime.yml
          rm -f .github/workflows/slice9-source-snapshot.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: classify lifecycle budget exhaustion"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
